services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      FQDN: ${FQDN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - web

  server:
    build:
      context: ./server
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      AGENT_TOKENS: ${AGENT_TOKENS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_ALLOWED_EMAILS: ${GOOGLE_ALLOWED_EMAILS}
      GOOGLE_ALLOWED_DOMAINS: ${GOOGLE_ALLOWED_DOMAINS}
      CORS_ORIGINS: https://${FQDN}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      WS_SESSION_TIMEOUT_SECONDS: ${WS_SESSION_TIMEOUT_SECONDS:-3600}
      SSL_ENABLED: "false"
      TURN_SECRET: ${TURN_SECRET}
      TURN_URLS: ${TURN_URLS}
      TURN_TTL_SECONDS: ${TURN_TTL_SECONDS:-3600}

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: https://${FQDN}
        VITE_WS_URL: wss://${FQDN}/ws/signaling
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    restart: unless-stopped
    expose:
      - "80"

  # TURN relay for WebRTC NAT traversal. Uses host networking so coturn can
  # advertise the droplet's public IP and receive UDP relay traffic directly.
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command:
      - "-n"
      - "--no-cli"
      - "--log-file=stdout"
      - "--listening-port=3478"
      - "--fingerprint"
      - "--lt-cred-mech"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET}"
      - "--realm=${FQDN}"
      - "--no-tls"
      - "--no-dtls"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--external-ip=${TURN_EXTERNAL_IP}"
      - "--no-multicast-peers"
      - "--no-loopback-peers"

volumes:
  caddy_data:
  caddy_config:
